interface:
  display_name: "禅道Bug分拣"
  short_description: "当前Bug分拣、记忆匹配和修复资格判断"
  default_prompt: "Use $zentao-bug-triage in ASR3601/ASR3602 Crane/LVGL firmware workspaces when asked to check current bugs: fetch Zentao bugs for the current branch, link each bug to verified fix-pattern memory with high/medium/low/no-match evidence, assign conservative repair eligibility, split items into work-items.md and ignored-items.md, open selected details, parse latest reactivation notes, download attachments, inspect current code and git history before editing, and report whether each issue exists or was already fixed."
