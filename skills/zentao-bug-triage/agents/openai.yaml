interface:
  display_name: "禅道Bug分拣"
  short_description: "3601/3602工程当前Bug分拣"
  default_prompt: "Use $zentao-bug-triage in ASR3601/ASR3602 Crane/LVGL firmware workspaces when asked to check current bugs: fetch Zentao bugs for the current branch, split them into work-items.md for Codex-inspect/fix items and ignored-items.md for platform/low-level/log-needed/unclear items, open selected bug details, parse history records and latest reactivation notes, download attachments, inspect the related code one by one, compare bug creation/reactivation times with git commits, and report whether each issue exists or was already fixed."
policy:
  allow_implicit_invocation: true
